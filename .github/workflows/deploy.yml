name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  # ============================================================================
  # JOB 1: Build images and push to GHCR.
  # Tagged with both :latest (alias) and :${git-sha} (immutable).
  # ============================================================================
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push counter app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/dolr-ai/yral-hello-world-counter:latest
            ghcr.io/dolr-ai/yral-hello-world-counter:${{ github.sha }}

      - name: Build and push Patroni image
        uses: docker/build-push-action@v6
        with:
          context: ./patroni
          push: true
          tags: |
            ghcr.io/dolr-ai/yral-hello-world-counter-patroni:latest
            ghcr.io/dolr-ai/yral-hello-world-counter-patroni:${{ github.sha }}

  # ============================================================================
  # JOB 2: Deploy etcd + Patroni + HAProxy as Swarm stack "counter-db".
  # Pre-pulls the Patroni image on each server (private GHCR auth issue).
  # ============================================================================
  deploy-db-stack:
    name: Deploy etcd + Patroni + HAProxy (Swarm stack)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Copy stack files + CI scripts to Swarm manager (rishi-1)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_1_IP }}
          username: deploy
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          source: "etcd/stack.yml,patroni/stack.yml,haproxy/stack.yml,haproxy/haproxy.cfg,scripts/ci/deploy-db-stack.sh"
          target: /home/deploy/counter-db-stack

      - name: Pre-pull Patroni image on Server 1
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_1_IP }}
          username: deploy
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/dolr-ai/yral-hello-world-counter-patroni:${{ github.sha }}

      - name: Pre-pull Patroni image on Server 2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_2_IP }}
          username: deploy
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/dolr-ai/yral-hello-world-counter-patroni:${{ github.sha }}

      - name: Pre-pull Patroni image on Server 3
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_3_IP }}
          username: deploy
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/dolr-ai/yral-hello-world-counter-patroni:${{ github.sha }}

      - name: Deploy counter-db stack via Swarm manager
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_1_IP }}
          username: deploy
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,POSTGRES_PASSWORD,REPLICATION_PASSWORD,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            chmod +x /home/deploy/counter-db-stack/scripts/ci/deploy-db-stack.sh
            /home/deploy/counter-db-stack/scripts/ci/deploy-db-stack.sh
        env:
          IMAGE_TAG: ${{ github.sha }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REPLICATION_PASSWORD: ${{ secrets.REPLICATION_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

  # ============================================================================
  # JOB 3: Deploy counter app + Caddy to rishi-1 and rishi-2.
  # ============================================================================
  deploy-app:
    name: Deploy counter app + Caddy to rishi-1 and rishi-2
    runs-on: ubuntu-latest
    needs: deploy-db-stack

    steps:
      - uses: actions/checkout@v4

      # ---------- SERVER 1 ----------
      - name: Copy app + Caddy + CI scripts to Server 1
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_1_IP }}
          username: deploy
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,caddy/Caddyfile,caddy/docker-compose.yml,scripts/ci/deploy-app.sh"
          target: /home/deploy/yral-hello-world-counter

      - name: Deploy app + Caddy on Server 1
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_1_IP }}
          username: deploy
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,DATABASE_URL,SENTRY_DSN,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            chmod +x /home/deploy/yral-hello-world-counter/scripts/ci/deploy-app.sh
            /home/deploy/yral-hello-world-counter/scripts/ci/deploy-app.sh
        env:
          IMAGE_TAG: ${{ github.sha }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_SERVER_1 }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      # ---------- SERVER 2 ----------
      - name: Copy app + Caddy + CI scripts to Server 2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_2_IP }}
          username: deploy
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,caddy/Caddyfile,caddy/docker-compose.yml,scripts/ci/deploy-app.sh"
          target: /home/deploy/yral-hello-world-counter

      - name: Deploy app + Caddy on Server 2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_2_IP }}
          username: deploy
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,DATABASE_URL,SENTRY_DSN,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            chmod +x /home/deploy/yral-hello-world-counter/scripts/ci/deploy-app.sh
            /home/deploy/yral-hello-world-counter/scripts/ci/deploy-app.sh
        env:
          IMAGE_TAG: ${{ github.sha }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_SERVER_2 }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      # ---------- VERIFY ----------
      - name: Verify Server 1 health
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_1_IP }}
          username: deploy
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          script: |
            sleep 10
            curl -sf -H "Host: hello-world-counter.rishi.yral.com" http://localhost/health

      - name: Verify Server 2 health
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_2_IP }}
          username: deploy
          key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}
          script: |
            sleep 10
            curl -sf -H "Host: hello-world-counter.rishi.yral.com" http://localhost/health

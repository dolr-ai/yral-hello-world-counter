# HAProxy configuration for PostgreSQL routing
#
# WHY HAProxy?
# The app needs to always connect to the CURRENT PostgreSQL primary.
# But the primary can change (failover). HAProxy solves this by checking
# Patroni's REST API (/master endpoint) to find which node is primary,
# then routing SQL connections there automatically.
#
# If rishi-1 is primary and dies → Patroni elects rishi-2 → HAProxy detects it
# within 3 seconds → routes to rishi-2. The app's DATABASE_URL never changes.

global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode tcp          # TCP mode: HAProxy sees raw bytes, not HTTP. Correct for PostgreSQL.
    option tcplog
    timeout connect 5s
    timeout client 60s
    timeout server 60s

frontend postgresql_frontend
    bind *:5432       # App connects to haproxy:5432 via Docker web network
    default_backend postgresql_primary

backend postgresql_primary
    # option httpchk: use HTTP to check the health endpoint (Patroni's /master)
    # Even though we're in TCP mode for data, we use HTTP for the health CHECK only.
    option httpchk GET /master
    http-check expect status 200
    # WHY service names instead of IPs?
    # On the db-internal overlay network, Patroni service names resolve automatically.
    # If a Patroni container restarts or moves, the name still resolves correctly.
    # Hardcoded IPs would break after a failover recovery.
    #
    # "check port 8008" → check the /master endpoint on port 8008 (Patroni REST API)
    # "inter 3s"        → check every 3 seconds
    # "fall 3"          → mark as DOWN after 3 consecutive failures (9 seconds)
    # "rise 2"          → mark as UP after 2 consecutive successes (6 seconds)
    server patroni-rishi-1 patroni-rishi-1:5432 maxconn 100 check port 8008 inter 3s fall 3 rise 2
    server patroni-rishi-2 patroni-rishi-2:5432 maxconn 100 check port 8008 inter 3s fall 3 rise 2
    server patroni-rishi-3 patroni-rishi-3:5432 maxconn 100 check port 8008 inter 3s fall 3 rise 2

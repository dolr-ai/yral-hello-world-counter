# Docker Stack file for HAProxy.
# Deployed via CI with: docker stack deploy --compose-file haproxy-stack.yml counter-db
#
# WHY HAProxy on BOTH the "web" AND "db-internal" networks?
# - "web": the counter app (also on web) connects to haproxy-rishi-X:5432 for database queries
# - "db-internal": HAProxy must reach the Patroni nodes to health-check /master and
#   route SQL connections to whichever PostgreSQL is the current primary
#
# WHY two pinned services instead of replicas=2?
# With replicas=2, Swarm might place both on the same server (if one server is
# the most available). We need exactly one HAProxy per app server.
# Pinning with placement constraints guarantees one per server.
#
# WHY Swarm configs for haproxy.cfg?
# Swarm configs distribute a file to containers without mounting host paths.
# The CI copies haproxy.cfg to the manager, then stack deploy distributes it.

version: "3.8"

services:
  haproxy-rishi-1:
    image: haproxy:2.8-alpine
    configs:
      - source: haproxy_cfg
        target: /usr/local/etc/haproxy/haproxy.cfg
    networks:
      - web
      - db-internal
    deploy:
      placement:
        constraints:
          - node.labels.server == rishi-1
      restart_policy:
        condition: any

  haproxy-rishi-2:
    image: haproxy:2.8-alpine
    configs:
      - source: haproxy_cfg
        target: /usr/local/etc/haproxy/haproxy.cfg
    networks:
      - web
      - db-internal
    deploy:
      placement:
        constraints:
          - node.labels.server == rishi-2
      restart_policy:
        condition: any

configs:
  haproxy_cfg:
    file: ./haproxy.cfg

networks:
  web:
    external: true
  db-internal:
    external: true
